<svg width="1400" height="320" viewBox="0 0 1400 320" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1400" y2="320" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#0F3A33"/>
      <stop offset="1" stop-color="#0E1311"/>
    </linearGradient>
  </defs>

  <rect width="1400" height="320" fill="url(#bg)"/>



  <!-- status dots, echoing module library -->
  <rect x="1240" y="20" width="8" height="8" fill="#DBFF4D"/>
  <rect x="1256" y="20" width="8" height="8" fill="#B8E6C8" opacity="0.5"/>
  <rect x="1272" y="20" width="8" height="8" fill="#1A211F" stroke="#3E8C7A" stroke-width="1"/>

  <!-- display wordmark -->
  <text x="40" y="185" font-family="Sora, Aptos, sans-serif" font-size="96" font-weight="600" fill="#ECEAE3">VEM</text>

  <!-- lime accent underline, single signal per brand rule -->
  <rect x="42" y="205" width="120" height="6" fill="#DBFF4D"/>

  <text x="40" y="250" font-family="Aptos, sans-serif" font-size="22" fill="#D9EFD8">Version Equipment Manager</text>
  <text x="40" y="280" font-family="Aptos, sans-serif" font-size="16" fill="#B8E6C8" opacity="0.75">Configuration in control — across every system, every vendor, every site.</text>

</svg>
